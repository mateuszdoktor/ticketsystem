spring.config.activate.on-profile=test

spring.datasource.url=jdbc:h2:mem:ticketsystem;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

security.jwt.secret=test-secret-key-that-is-at-least-32-characters

logging.level.root=WARN
logging.level.com.example.ticketsystem=INFO
logging.level.org.springframework.security=WARN
